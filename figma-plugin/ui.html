<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OKScale Generator</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      }
      body {
        margin: 0;
        background: #f4f7ec;
        color: #0b0c07;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .head {
        padding: 12px;
        border-bottom: 1px solid #cfd3c5;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .title {
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .body {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 11px;
        color: #565b4d;
      }
      input,
      select,
      button {
        font: inherit;
        border: 1px solid #cfd3c5;
        background: #fbfcf8;
        color: #0b0c07;
        border-radius: 8px;
        padding: 8px;
      }
      input:focus,
      select:focus,
      button:focus {
        outline: 2px solid #0b0c07;
        outline-offset: 1px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn-primary {
        background: #0b0c07;
        color: #f4f7ec;
      }
      .status {
        font-size: 11px;
        color: #565b4d;
        min-height: 16px;
      }
      .status.error {
        color: #8a2727;
      }
      .palette {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .role {
        border: 1px solid #cfd3c5;
        border-radius: 10px;
        background: #fbfcf8;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .role-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 11px;
      }
      .swatches {
        display: grid;
        grid-template-columns: repeat(11, minmax(0, 1fr));
        gap: 4px;
      }
      .swatch {
        height: 20px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .warn {
        font-size: 11px;
        color: #7a6510;
      }
      .foot {
        margin-top: auto;
        border-top: 1px solid #cfd3c5;
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: #565b4d;
      }
      .link {
        background: none;
        border: none;
        padding: 0;
        color: inherit;
        text-decoration: underline;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <span class="title">OKScale Generator</span>
        <button id="closeBtn" class="link" type="button">Close</button>
      </div>

      <div class="body">
        <div class="field">
          <label for="colorInput">Base color</label>
          <input id="colorInput" value="#d9ff00" />
        </div>

        <div class="row">
          <div class="field">
            <label for="shadeMode">Shade mode</label>
            <select id="shadeMode">
              <option value="none">none</option>
              <option value="warm">warm</option>
              <option value="cool">cool</option>
              <option value="natural" selected>natural</option>
            </select>
          </div>
          <div class="field">
            <label for="harmonyType">Harmony</label>
            <select id="harmonyType">
              <option value="complementary" selected>complementary</option>
              <option value="analogous">analogous</option>
              <option value="triadic">triadic</option>
              <option value="split-complementary">split-complementary</option>
              <option value="tetradic">tetradic</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="anchorBehavior">Anchor behavior</label>
          <select id="anchorBehavior">
            <option value="preserve-input" selected>preserve-input</option>
            <option value="auto-gamut">auto-gamut</option>
          </select>
        </div>

        <div class="actions">
          <button id="generateBtn" type="button">Generate</button>
          <button id="applyBtn" type="button" class="btn-primary">Apply Variables</button>
        </div>

        <div id="status" class="status"></div>
        <div id="warnings"></div>
        <div id="palette" class="palette"></div>
      </div>

      <div class="foot">
        <span>Collection: OKScale</span>
        <span>variables: role/step</span>
      </div>
    </div>

    <script src="./dist/ui.js"></script>
  </body>
</html>
